<section class="page">
  <div class="toolbar-row">
    <h2>Employees</h2>
    <button mat-flat-button color="primary" routerLink="add">
      <mat-icon>person_add</mat-icon>
      Add Employee
    </button>
  </div>
  <mat-form-field appearance="outline">
    <mat-label>Search employees</mat-label>
    <input matInput [(ngModel)]="q" (ngModelChange)="load()" />
  </mat-form-field>
  <div class="table-wrap">
    <table mat-table [dataSource]="rows">
      <ng-container matColumnDef="code">
        <th mat-header-cell *matHeaderCellDef>Code</th>
        <td mat-cell *matCellDef="let e">{{ e.employeeCode }}</td>
      </ng-container>
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let e">{{ e.firstName }} {{ e.lastName }}</td>
      </ng-container>
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let e">{{ e.email }}</td>
      </ng-container>
      <ng-container matColumnDef="department">
        <th mat-header-cell *matHeaderCellDef>Department</th>
        <td mat-cell *matCellDef="let e">{{ e.departmentName }}</td>
      </ng-container>
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let e">{{ e.status }}</td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let e">
          <button mat-icon-button [routerLink]="[e.id]" aria-label="View">
            <mat-icon>visibility</mat-icon>
          </button>
          <button
            mat-icon-button
            *ngIf="auth.canEditEmployee(e.id)"
            [routerLink]="[e.id, 'edit']"
            aria-label="Edit"
          >
            <mat-icon>edit</mat-icon>
          </button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="columns"></tr>
      <tr mat-row *matRowDef="let row; columns: columns"></tr>
    </table>
    <mat-paginator
      [length]="total"
      [pageSize]="10"
      (page)="page($event)"
    ></mat-paginator>
  </div>
</section>
