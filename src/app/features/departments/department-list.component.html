<section class="page">
  <div class="toolbar-row"><h2>Departments</h2><button mat-flat-button color="primary" routerLink="add"><mat-icon>add</mat-icon>Add Department</button></div>
  <div class="table-wrap">
    <table mat-table [dataSource]="rows">
      <ng-container matColumnDef="name"><th mat-header-cell *matHeaderCellDef>Name</th><td mat-cell *matCellDef="let d">{{ d.name }}</td></ng-container>
      <ng-container matColumnDef="description"><th mat-header-cell *matHeaderCellDef>Description</th><td mat-cell *matCellDef="let d">{{ d.description }}</td></ng-container>
      <tr mat-header-row *matHeaderRowDef="columns"></tr>
      <tr mat-row *matRowDef="let row; columns: columns;"></tr>
    </table>
  </div>
</section>
